dl_toolbox: "torch"  # The deep learning toolbox. Choices: "torch", "mindspore", "tensorlayer"
project_name: "XuanCe_Benchmark"
logger: "tensorboard"  # Choices: tensorboard, wandb.
wandb_user_name: "your_user_name"

render: true
test: true
benchmark: false
parallels: 1

#render: false
#test: false
#benchmark: true
#parallels: 16

render_mode: 'human' # Choices: 'human', 'rgb_array'.
fps: 50

device: "cuda:0"  # Choose an calculating device. PyTorch: "cpu", "cuda:0"; TensorFlow: "cpu"/"CPU", "gpu"/"GPU"; MindSpore: "CPU", "GPU", "Ascend", "Davinci".
distributed_training: False  # Whether to use multi-GPU for distributed training.
master_port: '12355'  # The master port for current experiment when use distributed training.

agent: "MASAC"  # the learning algorithms_marl
env_name: "Search"  # Name of the environment.
env_id: "masac_simple_search"
env_seed: 1
continuous_action: true  # Continuous action space or not.
learner: "MASAC_Learner"
policy: "Gaussian_MASAC_Policy"
#policy: "MASAC_Policy"
#representation: "AC_CNN_Atari"

representation: "Hybrid_Representation"
#representation: "Basic_Identical"

vectorize: "DummyVecMultiAgentEnv"
runner: "MARL"  # Runner

# recurrent settings for Basic_RNN representation.
use_rnn: False  # If to use recurrent neural network as representation. (The representation should be "Basic_RNN").
rnn: "GRU"  # The type of recurrent layer.
#fc_hidden_sizes: [64, 64, 64]  # The hidden size of feed forward layer in RNN representation.
recurrent_hidden_size: 64  # The hidden size of the recurrent layer.
N_recurrent_layers: 1  # The number of recurrent layer.
dropout: 0  # dropout should be a number in range [0, 1], the probability of an element being zeroed.
normalize: "LayerNorm"  # Layer normalization.
initialize: "orthogonal"  # Network initializer.
gain: 0.01

#representation_hidden_size: []  # the units for each hidden layer
actor_hidden_size: [256, 256]
critic_hidden_size: [256, 256]
activation: 'leaky_relu'
activation_action: 'tanh'
use_parameter_sharing: True
use_actions_mask: False

seed: 1
#parallels: 1   # 1/29 16 to 1
buffer_size: 10000 #原100000
batch_size: 256
learning_rate_actor: 0.0003  # learning rate for actor
learning_rate_critic: 0.0003  # learning rate for critic
gamma: 0.95  # discount factor
tau: 0.001  # soft update for target networks
alpha: 0.01
use_automatic_entropy_tuning: True

start_training: 1000  # start training after n steps
running_steps: 10000000
training_frequency: 25

use_grad_clip: True
grad_clip_norm: 0.5

eval_interval: 10000
test_episode: 5 # 1/29 5 to 1

log_dir: "logs/masac/"
model_dir: "models/masac/"

# my_configs
grid_size : 64
num_searchers : 3
num_targets : 5          # ← 改为 2（原来是 0，目标通道需要有目标）
num_obstacles : 0
max_obstacle_ratio: 0.20 # 障碍物占地图面积上限 20%
max_episode_steps : 300
detect_radius : 4.0
decay_rate : 0.998
min_decay_val : 0.1
coverage_reward_scale: 10.0  # 全局覆盖率增量奖励系数
coverage_threshold: 0.85     # 覆盖率达到此值时 episode 成功终止
coverage_done_reward: 20.0   # 覆盖率达标时的额外奖励

agent_collision_dist : 3.0
max_speed : 2.0
map_channels : 3         # ← 新增：地图通道数
map_h : 64               # ← 新增：地图高度（等于 grid_size）
map_w : 64               # ← 新增：地图宽度（等于 grid_size）

# CNN 相关（vec_dim = 4 + (num_searchers-1)*2 = 8）
vec_dim: 9
cnn_output_dim: 256
# 观测可视化
debug_obs_vis: False
debug_obs_interval: 20   # 每20步刷新一次，太频繁会拖慢速度
heatmap_vis: False        # ← True=开启热力图，False=关闭
heatmap_interval: 20      # ← 每N步画一次（建议20~50）
heatmap_save: False       # ← True=同时保存为png文件
